spring.application.name=backend

# Configuración híbrida para Base de Datos (Docker / Local)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:base}?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.open-in-view=false

# Configuración de Seguridad (JWT)
jwt.secret=U29tZVN1cGVyU2VjdXJlU2VjcmV0S2V5MTIzNDU2Nzg5MDEyMzQ1Njc4OQ==
jwt.expiration=86400000
jwt.clockSkew=60

# Logs de Seguridad (Modo Debug para desarrollo)
logging.level.org.springframework.security=DEBUG

# Configuración de Carga de Archivos (Evidencias)
file.upload-dir=uploads/evidencias
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB